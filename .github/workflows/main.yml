name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  PYTHON_VERSION: 3.11  # Use Python 3.11 as you requested

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r chatbot_theme_identifier/backend/requirements.txt

      - name: Build Gradio App (Optional Step if you have a frontend to build)
        run: echo "No build step needed for backend-only Gradio app"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: web-build-artifact
          path: chatbot_theme_identifier/backend/app/api  # Change to actual static export folder if needed

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: web-build-artifact
